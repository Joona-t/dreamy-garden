<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dreamy Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="popup.css">
</head>
<body>
    <span class="logo">🐛</span>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;position:relative">
      <h1>Dreamy Garden</h1>
      <button id="themeTab" class="theme-tab" title="Cycle theme" aria-label="Cycle theme">retro</button>
    </div>
    <p>Fuzzy caterpillar · Psychedelic garden · Cozy vibes</p>

    <button class="play-btn" id="play-btn">Open Game ✨</button>

    <div class="toggle-row">
        <span class="toggle-label">Show on New Tab</span>
        <div class="toggle-switch" id="newtab-toggle" role="switch" aria-checked="true" tabindex="0">
            <span class="toggle-knob"></span>
        </div>
    </div>

    <hr class="divider">

    <p class="hint">
        Arrow keys / WASD &nbsp;·&nbsp; Space to pause
    </p>

    <script src="popup.js"></script>
</body>
</html>
