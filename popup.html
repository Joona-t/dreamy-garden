<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dreamy Garden</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
    <span class="logo">🐛</span>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px">
      <h1>Dreamy Garden</h1>
      <button class="btn-dark-toggle" id="btnDarkMode" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <p>Fuzzy caterpillar · Psychedelic garden · Cozy vibes</p>

    <button class="play-btn" id="play-btn">Open Game ✨</button>

    <div class="toggle-row">
        <span class="toggle-label">Show on New Tab</span>
        <div class="toggle-switch" id="newtab-toggle" role="switch" aria-checked="true" tabindex="0">
            <span class="toggle-knob"></span>
        </div>
    </div>

    <hr class="divider">

    <p class="hint">
        Arrow keys / WASD &nbsp;·&nbsp; Space to pause
    </p>

    <script src="popup.js"></script>
</body>
</html>
